name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      # 1. Instala o pnpm antes de tudo
      - name: Instalar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8 # Ou a versão que você usa localmente

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm' # Agora ele vai buscar o pnpm-lock.yaml corretamente

      - name: Instalar Dependências
        run: pnpm install

      - name: Gerar Build
        run: pnpm run build

      - name: Enviar para a VPS (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "build/" 
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/var/www/arquibancada-cblow/"